name: Docker Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    name: Build Docker Images & Test Stack
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # Docker daemon is already running on ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          cd fap
          docker-compose build
        timeout-minutes: 15

      - name: Start services
        run: |
          cd fap
          docker-compose up -d
        timeout-minutes: 5

      - name: Wait for services to be healthy
        run: |
          cd fap
          echo "⏳ Waiting for services to be healthy..."
          
          # Function to check if service is healthy
          check_service() {
            local service=$1
            local port=$2
            local retries=30
            local count=0
            
            while [ $count -lt $retries ]; do
              if curl -f http://localhost:$port/health 2>/dev/null; then
                echo "✅ $service is healthy"
                return 0
              fi
              count=$((count + 1))
              echo "  Attempt $count/$retries for $service..."
              sleep 2
            done
            
            echo "❌ $service failed to become healthy"
            return 1
          }
          
          # Check all services
          check_service "coordinator" 8011 || exit 1
          check_service "participant-docs" 8012 || exit 1
          check_service "participant-kb" 8013 || exit 1
          check_service "participant-logs" 8014 || exit 1
          
          echo "✅ All services are healthy"
        timeout-minutes: 5

      - name: Verify docker-compose configuration
        run: |
          cd fap
          docker-compose config > /dev/null
          echo "✅ docker-compose.yml is valid"

      - name: Check container status
        run: |
          cd fap
          echo "📊 Container Status:"
          docker-compose ps
          
          echo ""
          echo "📋 Container Logs Summary:"
          docker-compose logs --no-color | head -100

      - name: Test coordinator API endpoints
        run: |
          cd fap
          
          echo "🧪 Testing Coordinator Endpoints"
          
          # Test health
          echo -n "Testing /health... "
          curl -f http://localhost:8011/health > /dev/null && echo "✅" || echo "❌"
          
          # Test participants health
          echo -n "Testing Participant Docs /health... "
          curl -f http://localhost:8012/health > /dev/null && echo "✅" || echo "❌"
          
          echo -n "Testing Participant KB /health... "
          curl -f http://localhost:8013/health > /dev/null && echo "✅" || echo "❌"
          
          echo -n "Testing Participant Logs /health... "
          curl -f http://localhost:8014/health > /dev/null && echo "✅" || echo "❌"

      - name: Run FAP demo scenario
        run: |
          cd fap
          echo "🚀 Running FAP demo scenario..."
          docker-compose exec -T coordinator python examples/demo_scenario/run_demo.py \
            --coordinator-url http://localhost:8011
          echo "✅ Demo completed successfully"
        timeout-minutes: 5

      - name: Run unit tests
        run: |
          cd fap
          echo "🧪 Running unit tests..."
          docker-compose run --rm coordinator python -m pytest -v --tb=short
        timeout-minutes: 10

      - name: Run type checking
        run: |
          cd fap
          echo "🔍 Running mypy type checking..."
          docker-compose run --rm coordinator python -m mypy apps packages tests --show-error-codes
        continue-on-error: true
        timeout-minutes: 5

      - name: Run linting
        run: |
          cd fap
          echo "📝 Running ruff linting..."
          docker-compose run --rm coordinator python -m ruff check .
        continue-on-error: true
        timeout-minutes: 5

      - name: Collect logs on failure
        if: failure()
        run: |
          cd fap
          echo "📋 Coordinator logs:"
          docker-compose logs coordinator
          
          echo ""
          echo "📋 Participant Docs logs:"
          docker-compose logs participant-docs
          
          echo ""
          echo "📋 Participant KB logs:"
          docker-compose logs participant-kb
          
          echo ""
          echo "📋 Participant Logs logs:"
          docker-compose logs participant-logs
          
          echo ""
          echo "📋 PostgreSQL logs:"
          docker-compose logs postgres

      - name: Clean up
        if: always()
        run: |
          cd fap
          docker-compose down -v
          echo "✅ Cleanup complete"

  lint-dockerfile:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: fap/Dockerfile
          ignore: DL3008,DL3009
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'fap/'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  build-and-push-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, lint-dockerfile]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: fap/
          file: fap/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
